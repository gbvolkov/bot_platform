[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "gaz-index-builder"
version = "0.1.0"
description = "Standalone GAZ document index builder extracted from bot_platform."
readme = "README.md"
requires-python = ">=3.13,<3.14"
dependencies = [
    "rag-lib[raptor] @ git+https://github.com/gbvolkov/rag-lib.git",
    "chromadb>=0.5.3",
    "langchain-chroma>=1.0.0",
    "langchain-core>=1.0.0",
    "langchain-huggingface>=1.0.0",
    "langchain-openai>=1.0.1",
    "nltk>=3.9.4",
    "openpyxl>=3.1.5",
    "pandas>=2.3.3",
    "pillow>=10.0.0",
    "pypdf>=6.7.0",
    "python-dotenv>=1.1.1",
    "scikit-learn>=1.7.2",
    "sentence-transformers>=5.1.2",
    "tabulate>=0.9.0",
]

[project.scripts]
gaz-index-build = "gaz_index_builder.build:main"

[tool.hatch.build.targets.wheel]
packages = ["src/gaz_index_builder"]

[tool.hatch.build.targets.wheel.force-include]
"src/gaz_index_builder/models.toml" = "gaz_index_builder/models.toml"

[tool.hatch.metadata]
allow-direct-references = true

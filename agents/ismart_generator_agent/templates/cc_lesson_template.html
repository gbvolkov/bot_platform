<style>

.cc-lesson { max-width: 920px; margin: 0 auto; padding: 24px 18px; box-sizing: border-box; font-family: Arial, sans-serif; font-size: 17px; line-height: 1.7; color: #222; background: #fff; }

.cc-lesson * { box-sizing: border-box; }

.cc-lesson h1 { margin: 0 0 12px; text-align: center; font-size: 30px; line-height: 1.3; font-weight: 700; }

.cc-lesson h2 { margin: 38px 0 16px; padding-bottom: 8px; border-bottom: 1px solid #ddd; font-size: 25px; line-height: 1.35; font-weight: 700; }

.cc-lesson h3 { margin: 28px 0 12px; font-size: 21px; line-height: 1.35; font-weight: 700; }

.cc-lesson p { margin: 12px 0; }

.cc-lesson ul, .cc-lesson ol { margin: 12px 0 18px 24px; padding: 0; }

.cc-lesson li { margin: 6px 0; }

.cc-meta { margin-bottom: 30px; text-align: center; color: #666; font-size: 16px; }

.cc-toc { margin: 26px 0 32px; padding: 18px 22px; border: 1px solid #ddd; background: #f8f8f8; border-radius: 8px; }

.cc-toc h2 { margin-top: 0; border-bottom: none; padding-bottom: 0; font-size: 22px; }

.cc-toc a { color: #1d4ed8; text-decoration: none; }

.cc-toc a:hover { text-decoration: underline; }

.cc-note { margin: 20px 0; padding: 14px 18px; border-left: 4px solid #777; background: #f7f7f7; border-radius: 6px; }

.cc-note-title { margin-bottom: 8px; font-weight: 700; }

.cc-formula { display: block; width: 100%; max-width: 100%; margin: 12px 0; padding: 10px 14px; border: 1px solid #ddd; background: #f8f8f8; border-radius: 6px; font-family: "Times New Roman", serif; font-size: 18px; line-height: 1.5; overflow-x: auto; }

.cc-inline-code { font-family: Consolas, Monaco, monospace; font-size: 0.95em; background: #f2f2f2; padding: 1px 5px; border-radius: 4px; }

.cc-lesson pre { width: 100%; max-width: 100%; margin: 18px 0 24px; padding: 16px; overflow-x: auto; background: #1f1f1f; color: #f5f5f5; border-radius: 8px; font-size: 15px; line-height: 1.55; }

.cc-lesson pre code { font-family: Consolas, Monaco, monospace; background: transparent; color: inherit; padding: 0; white-space: pre; }

.cc-lesson pre.cc-console code { color: #4ade80; }

.cc-table-wrapper { width: 100%; overflow-x: auto; margin: 18px 0 24px; }

.cc-table { width: 100%; min-width: 760px; border-collapse: collapse; }

.cc-table th, .cc-table td { border: 1px solid #ccc; padding: 9px 12px; text-align: center; vertical-align: middle; }

.cc-table th { background: #f2f2f2; font-weight: 700; }

@media (max-width: 640px) {

.cc-lesson { padding: 18px 14px; font-size: 16px; }

.cc-lesson h1 { font-size: 25px; }

.cc-lesson h2 { font-size: 22px; }

.cc-lesson h3 { font-size: 19px; }

.cc-lesson pre { font-size: 14px; }

}

</style>
<div class="cc-lesson">
{{ body_html }}
</div>
